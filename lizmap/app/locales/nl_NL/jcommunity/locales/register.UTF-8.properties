registration.waiting.title=Inschrijving
registration.waiting.text.html=<p>Uw account is aangemaakt, maar voordat we deze kunnen gebruiken, moeten we uw e-mailadres verifiëren.</p> <p>Om uw e-mailadres te verifiëren, hebben we u zojuist een e-mail gestuurd met een link waarop u moet klikken. Controleer uw spammap als u deze e-mail niet in uw inbox ziet.</p>
registration.cmdline.ok=Gebruiker is succesvol aangemaakt.
registration.confirm.title=Activering van uw account
registration.confirm.alreadydone=Uw account is al geactiveerd. Op de website kunt u zich identificeren.
registration.confirm.ok=Uw account is geactiveerd. Op de website kunt u zich identificeren.
registration.confirm.badkey=Activering is niet mogelijk: de sleutel of de gebruikersnaam is ongeldig.
registration.confirm.badstatus=Activering is niet mogelijk: uw account is niet nieuw.
registration.confirm.expiredkey=Activering is niet mogelijk: de aanvraag is verlopen. Vraag de beheerder van de website om uw account te activeren
admin.resend.email.title=Account aanmaken: verzend de validatie-e-mail opnieuw
admin.resend.email.text.html=<p>Er wordt een e-mail met een nieuwe validatiesleutel verzonden naar de gebruiker '%s' die een niet-gevalideerde account heeft. Gebruik deze functie wanneer de gebruiker u heeft geïnformeerd dat de validatiesleutel die hij heeft ontvangen, is verlopen.</p>
admin.resend.email.done.text.html=<p>De e-mail is naar de gebruiker verzonden.</p>
cmdline.create.help.usage=php cmdline.php jcommunity~user:create [-v] [--admin] [--reset] login e-mailadres [wachtwoord]
cmdline.create.help.description=Creëert een nieuw gebruikersaccount
cmdline.create.help.text=Het wachtwoord kan willekeurig worden opgegeven, of er kan een token per e-mail worden verzonden, zodat de gebruiker het zelf kan definiëren. Als de gebruiker al bestaat, mislukt het, tenzij je de optie '--no-error-if-exists' geeft.
cmdline.create.help.option.verbose=schakel de uitgebreide modus in
cmdline.create.help.option.admin=voeg de nieuwe gebruiker toe aan de groep "admins".
cmdline.create.help.option.reset=genereert een resetlink en stuurt deze naar e-mail
cmdline.create.help.option.noerror=Geef geen foutmelding als de gebruiker al bestaat
cmdline.create.help.parameter.login=De login van de nieuwe gebruiker
cmdline.create.help.parameter.email=Het e-mailadres van de nieuwe gebruiker
cmdline.create.help.parameter.password=Als het wachtwoord van de nieuwe gebruiker niet is gedefinieerd en de vlag '--reset' niet is opgegeven, wordt het wachtwoord willekeurig gegenereerd en gerapporteerd via de opdrachtregel
cmdline.delete.help.description=Verwijder een gebruikersaccount
cmdline.delete.help.text=Verwijder een gebruikersaccount
cmdline.delete.help.parameter.login=De login van het account dat moet worden verwijderd
cmdline.import.help.description=Import some user account from a CSV file
cmdline.import.help.text=Each field into the CSV file may correspond to a property of an account. You must declare the order of fields with the fields parameter.\n The CSV file must contain at least the login and the email fields.\n For example when each rows of the CSV contains a login, a birthdate and an email, and when possible fields are only \n 'login' and 'email' (so the birthday should be ignored), you must declare the fields parameter as 'login,,email' \n (no name for the second field,\
as we don't want to import the birthday)'.\n Example for the command: php console.php jcommunity~user:import accounts.csv "login,,email"
cmdline.import.help.parameter.csvfile=Path to the CSV file to import
cmdline.import.help.parameter.fields=List of fields to import, separated by commas.\n Indicate empty value or _ignore_ to ignore a field.\n The _role_ field may contain the role of the user for ACL.\n List of possible fields: %s .
cmdline.import.help.option.reset=Send a mail to the user in order to finalize the registration and set his password
cmdline.import.help.option.separator=Character used to separate fields in the CSV file.
cmdline.import.help.option.enclosure=Character used to enclose fields in the CSV file.
cmdline.import.help.option.wait=Wait time in tenths of a second between each account creation. To avoid exceeding the acceptable email sending rate.
cmdline.import.help.option.maxaccount=Number of accounts to import, when we want to import only a part of the CSV file. 0 means no limit.
cmdline.import.help.option.ignorefirstline=Ignore the first line of the CSV file when it does not contain some account data.
cmdline.import.error.unknownfield=Unknown field: %s
cmdline.import.error.bad.field.count=CSV values do not match the number of fields (line %s).
cmdline.import.notice.login.exists=line %s: %s - Account already exists.
cmdline.import.notice.login.imported=line %s: %s - imported.
import.error.login.missing=Login is missing from CSV data.
import.error.email.missing=Email is missing from CSV data.
cmdline.import.error.login.missing=Login is missing from list of fields.
cmdline.import.error.email.missing=Email is missing from list of fields.
cmdline.import.error.opening.file=Impossible to read file %s.
