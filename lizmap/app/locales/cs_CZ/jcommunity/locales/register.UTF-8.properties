registration.waiting.title=Registrace
registration.waiting.text.html=<p>Váš účet je vytvořen, ale před jeho použitím musíme ověřit váš e-mail.</p> <p>Proto jsme vám poslali e-mail obsahující odkaz, na který musíte kliknout. Zkontrolujte svou složku nevyžádané pošty, pokud se tento e-mail ve vaší doručené poště nezobrazuje.</p>
