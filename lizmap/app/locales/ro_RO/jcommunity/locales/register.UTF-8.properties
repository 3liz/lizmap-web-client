cmdline.create.help.usage=php cmdline.php jcommunity~user:create [-v] [--admin] [--reset] login email [password]
cmdline.create.help.description=Creează un cont de utilizator nou
cmdline.create.help.text=Parola poate fi dată, definită aleatoriu sau un jeton poate fi trimis prin e-mail, astfel încât utilizatorul să o poată defini singur. Dacă utilizatorul există deja, va eșua, cu excepția cazului în care adăugați opțiunea „--no-error-if-exist”.
cmdline.create.help.option.verbose=activează modul detaliat
cmdline.create.help.option.admin=adaugă noul utilizator la grupul „administratori”
cmdline.create.help.option.reset=generează un link de resetare și îl trimite la e-mail
cmdline.create.help.option.noerror=Nu se afișează o eroare dacă utilizatorul există deja
cmdline.create.help.parameter.login=Autentificarea noului utilizator
cmdline.create.help.parameter.email=Adresa de e-mail a noului utilizator
cmdline.create.help.parameter.password=Parola noului utilizator, dacă nu este definită și sufixul „--reset” nu este dat, parola va fi generată aleatoriu și raportată prin linia de comandă
cmdline.delete.help.description=Șterge un cont de utilizator
cmdline.delete.help.text=Șterge un cont de utilizator
cmdline.delete.help.parameter.login=Autentificarea contului de șters
cmdline.import.help.description=Import some user account from a CSV file
cmdline.import.help.text=Each field into the CSV file may correspond to a property of an account. You must declare the order of fields with the fields parameter.\n The CSV file must contain at least the login and the email fields.\n For example when each rows of the CSV contains a login, a birthdate and an email, and when possible fields are only \n 'login' and 'email' (so the birthday should be ignored), you must declare the fields parameter as 'login,,email' \n (no name for the second field,\
as we don't want to import the birthday)'.\n Example for the command: php console.php jcommunity~user:import accounts.csv "login,,email"
cmdline.import.help.parameter.csvfile=Path to the CSV file to import
cmdline.import.help.parameter.fields=List of fields to import, separated by commas.\n Indicate empty value or _ignore_ to ignore a field.\n The _role_ field may contain the role of the user for ACL.\n List of possible fields: %s .
cmdline.import.help.option.reset=Send a mail to the user in order to finalize the registration and set his password
cmdline.import.help.option.separator=Character used to separate fields in the CSV file.
cmdline.import.help.option.enclosure=Character used to enclose fields in the CSV file.
cmdline.import.help.option.wait=Wait time in tenths of a second between each account creation. To avoid exceeding the acceptable email sending rate.
cmdline.import.help.option.maxaccount=Number of accounts to import, when we want to import only a part of the CSV file. 0 means no limit.
cmdline.import.help.option.ignorefirstline=Ignore the first line of the CSV file when it does not contain some account data.
cmdline.import.error.unknownfield=Unknown field: %s
cmdline.import.error.bad.field.count=CSV values do not match the number of fields (line %s).
cmdline.import.notice.login.exists=line %s: %s - Account already exists.
cmdline.import.notice.login.imported=line %s: %s - imported.
import.error.login.missing=Login is missing from CSV data.
import.error.email.missing=Email is missing from CSV data.
cmdline.import.error.login.missing=Login is missing from list of fields.
cmdline.import.error.email.missing=Email is missing from list of fields.
cmdline.import.error.opening.file=Impossible to read file %s.
