registration.waiting.text.html=<p>Contul este creat, dar înainte de a-l folosi, trebuie să confirmăm adresa de e-mail.</p> <p>Pentru a confirma e-mailul, tocmai am trimis un e-mail care conține un link pe care trebuie să faci clic. Verifică dosarul de spam dacă nu găsești acest e-mail în căsuța de mesaje primite.</p>
