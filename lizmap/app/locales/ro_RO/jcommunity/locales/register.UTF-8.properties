admin.resend.email.title=Creare cont: trimite din nou e-mailul de validare
admin.resend.email.text.html=<p>Un e-mail cu o nouă cheie de validare va fi trimis utilizatorului „%s” care are un cont nevalidat. Utilizează această caracteristică când utilizatorul v-a informat că cheia de validare pe care a primit-o a expirat.</p>
