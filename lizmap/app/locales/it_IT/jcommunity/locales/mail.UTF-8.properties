registration.subject=Attivazione del tuo account sul sito %s
registration.body.html=<p>Ciao,</p>\n\n <p>hai creato un nuovo utente <em>"{$user->login|eschtml}"</em> su<a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>.</p>\n\n <p>Prima di usare l'account devi confermare la registrazione \n <a href="{$confirmation_link}">cliccando su questo link. Il link è valido {$validationKeyTTL}.</p>\n\n <p>A presto su {$domain_name}{$basePath}!</p>
registration.admin.body.html=<p>Hello,</p>\n\n <p>The administrator of the web site <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>\n have been created an account for you, with the login <em>"{$user->login|eschtml}"</em>.</p>\n\n <p>Before to use your account, you should confirm your registration by \n <a href="{$confirmation_link}">clicking on this link</a>, \n and then indicating a new password. The link is valid {$validationKeyTTL}.</p>\n\n <p>See you on\
{$domain_name}{$basePath}!</p>
password.reset.subject=Reset della password sul sito %s
password.reset.body.html=<p>Ciao,</p>\n\n <p>hai richiesto il reset della password per il tuo account <em>"{$user->login|eschtml}"</em>\n sul sito <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>.</p>\n\n <p>Se vuoi veramente cambiarla, <a href="{$confirmation_link}">clicca su questo link</a>.</p>\n\n <p>Puoi poi scegliere una nuova password. Il link è valido {$validationKeyTTL}.</p>\n\n <p>Se questa richiesta è un errore o non desideri confermare, ignora questa\
mail.\n La tua password non sarà cambiata.</p>\n\n <p>A presto su {$domain_name}{$basePath}!</p>
password.admin.reset.subject=Reset della password sul sito %s
password.admin.reset.body.html=<p>Ciao,</p>\n\n <p>hai richiesto il reset della password per il tuo account <em>"{$user->login|eschtml}"</em>\n sul sito <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>.</p>\n\n <p>Se vuoi veramente cambiarla, <a href="{$confirmation_link}">clicca su questo link</a>.</p>\n\n <p>Puoi poi scegliere una nuova password. Il link è valido {$validationKeyTTL}.</p>\n\n <p>Se questa richiesta è un errore o non desideri confermare, ignora questa\
mail.\n La tua password non sarà cambiata.</p>\n\n <p>A presto su {$domain_name}{$basePath}!</p>
account.change.notification.subject=Cambiamenti nel profilo di %s sul sito web %s
account.change.notification.body.html=<p>Ciao,</p>\n\n <p>L'utente {$userName} ha fatto alcune modifiche <a href="{$profilLink}">nel suo profilo</a>.</p> <p>Saluti.</p>
