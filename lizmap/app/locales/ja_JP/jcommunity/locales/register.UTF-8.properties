cmdline.create.help.usage=‎php コマンドライン.php jcommunity~ユーザー: 作成 [-v] [--admin] [--reset] ログインメール [パスワード]‎
cmdline.create.help.description=‎新しいユーザー アカウントを作成します。‎
cmdline.create.help.text=‎パスワードは、ユーザーが自分で定義できるように、パスワードを指定したり、ランダムに定義したり、トークンをメールで送信することができます。ユーザーは既に存在し、オプション '--no-error-if-exists' を指定しない限り、失敗します。‎
