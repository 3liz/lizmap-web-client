registration.subject=Aktivácia vášho účtu na webovej stránke%s
registration.body.html=<p>Ahoj,</p>\n\n<p>Vytvorili ste nový účet <em>"{$user->login|eschtml}"</em> na <a href="{$website_uri}" class="notexpandlink">{$ domain_name} {$ basePath}</a>.</p>\n\n<p>Pred použitím svojho účtu by ste mali potvrdiť svoju registráciu do\n<a href="{$confirmation_link}">kliknutím na tento odkaz</a>. Odkaz je platný {$ validationKeyTTL}.</p>\n\n<p>Uvidíme sa na {$ domain_name} {$ basePath}!</p>
registration.admin.body.html=<p>Hello,</p>\n\n <p>The administrator of the web site <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>\n have been created an account for you, with the login <em>"{$user->login|eschtml}"</em>.</p>\n\n <p>Before to use your account, you should confirm your registration by \n <a href="{$confirmation_link}">clicking on this link</a>, \n and then indicating a new password. The link is valid {$validationKeyTTL}.</p>\n\n <p>See you on\
{$domain_name}{$basePath}!</p>
password.reset.subject=Obnovte svoje heslo na webovej stránke%s
password.reset.body.html=<p>Ahoj,</p>\n\n<p>Požiadali ste o obnovenie hesla pre váš účet<em> „{$ user-> login | eschtml}“</em>\nna webovej stránke<a href="{$website_uri}" class="notexpandlink"> {$ domain_name} {$ basePath}</a>.</p>\n\n<p>Ak to naozaj chcete zmeniť, mali by ste <a href="{$confirmation_link}">kliknúť na tento odkaz</a>.</p>\n\n<p>Potom by ste mohli nastaviť nové heslo pre svoj účet. Odkaz je platný {$ validationKeyTTL}.</p>\n\n<p>Ak je táto žiadosť chybou alebo ak nechcete\
potvrdiť, tento e-mail ignorujte.\nVaše heslo sa nezmení.</p>\n\n<p>Uvidíme sa na {$ domain_name} {$ basePath}!</p>
password.admin.reset.subject=Obnovte svoje heslo na webovej stránke%s
password.admin.reset.body.html=<p>Ahoj, </p>\n\n<p>Správca webových stránok<a href="{$website_uri}" class="notexpandlink"> {$ domain_name} {$ basePath}</a>\nvám bol zaslaný tento e-mail, aby ste mohli zmeniť svoje heslo pre účet <em>"{$ user-> login}“</em>.</p>\n\n<p>Ak chcete potvrdiť zmenu, mali by ste<a href="{$confirmation_link}"> kliknúť na tento odkaz</a>.</p>\n\n<p>Potom by ste mohli nastaviť nové heslo pre svoj účet. Odkaz je platný {$ validationKeyTTL}.</p>\n\n<p>Ak je táto žiadosť\
chybou alebo nechcete potvrdiť, tento e-mail ignorujte,\na vaše heslo sa nezmení.</p>\n\n<p>Uvidíme sa na {$ domain_name} {$ basePath}!</p>
account.change.notification.subject=Changes into the profile of %s on the web site %s
account.change.notification.body.html=<p>Hello,</p>\n\n <p>The user {$userName} has made some changes <a href="{$profilLink}">into his profile</a>.</p> <p>Regards.</p>
