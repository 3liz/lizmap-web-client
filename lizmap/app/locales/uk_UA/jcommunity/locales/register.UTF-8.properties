admin.resend.email.text.html=<p>Електронний лист із новим ключем перевірки буде надіслано користувачеві '%s', який має непідтверджений обліковий запис. Використовуйте цю функцію, коли користувач повідомив вам, що термін дії отриманого ним ключа перевірки закінчився.</p>
