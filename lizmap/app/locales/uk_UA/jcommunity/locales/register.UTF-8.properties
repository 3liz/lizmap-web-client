registration.waiting.title=Реєстрація
registration.waiting.text.html=<p>Ваш обліковий запис створено, але перед його використанням ми повинні підтвердити вашу електронну пошту.</p><p>Щоб підтвердити вашу електронну пошту, ми просто надіслали вам електронний лист із посиланням, на яке ви повинні натиснути. Перевірте папку зі спамом, якщо ви не бачите цього листа у своїй папці "Вхідні".</p>
