cmdline.create.help.option.admin=dodaj nowego użytkownika do grupy „admins”
cmdline.create.help.option.reset=generuje link do resetowania i wysyła go na e-mail
cmdline.create.help.option.noerror=Nie wyświetlaj błędu, jeśli użytkownik już istnieje
cmdline.create.help.parameter.login=Login nowego użytkownika
cmdline.create.help.parameter.email=E-mail nowego użytkownika
cmdline.create.help.parameter.password=Hasło nowego użytkownika, jeśli nie jest zdefiniowane i flaga '--reset' nie jest podana, hasło zostanie wygenerowane losowo i zgłoszone za pośrednictwem wiersza poleceń
