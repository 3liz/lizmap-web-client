registration.waiting.title=Creation de votre compte
registration.waiting.text.html=<p>Votre compte vient d'être créé. Mais avant de pouvoir l'utiliser, nous devons vérifier votre adresse de courriel.</p> <p>Pour cela, vous devez cliquer sur le lien présent dans <strong>l'email que nous venons de vous envoyer</strong>. Vérifiez votre dossier de spam si vous ne le voyez pas dans votre boite au lettre d'ici quelques minutes.</p>
registration.cmdline.ok=L'utilisateur a été créé avec succés.
registration.confirm.title=Activation de votre compte
registration.confirm.alreadydone=Votre compte est déjà activé. Vous pouvez vous identifier sur le site.
registration.confirm.ok=Votre compte est maintenant activé et vous pouvez vous identifier sur le site.
registration.confirm.badkey=Activation impossible : la clé ou le nom d'utilisateur est invalide.
registration.confirm.badstatus=Activation impossible : votre compte ne vient pas d'être nouvellement créé.
registration.confirm.expiredkey=Activation impossible : la demande a expirée. Demander à un administrateur du site d'activer votre compte.
admin.resend.email.title=Inscription : renvoi d'un email de validation
admin.resend.email.text.html=<p>Un email avec une nouvelle clé de validation va être envoyé à l'utilisateur '%s' qui a un compte non validé.\nUtiliser cette fonction si l'utilisateur vous a informé que la clé qu'il a reçu a expiré.</p>
admin.resend.email.done.text.html=<p>L'email a été envoyé à l'utilisateur.</p>
cmdline.create.help.usage=php cmdline.php jcommunity~user:create [-v] [--admin] [--reset] login email [password]
cmdline.create.help.description=Créé un nouvel utilisateur
cmdline.create.help.text=Le mot de passe peut être donné ou généré aléatoirement, ou un mail peut être envoyé pour que l'utilisateur le choisisse lui-même.\nSi l'utilisateur existe déjà, une erreur est affichée, à moins que l'option '--no-error-if-exists' soit donnée.
cmdline.create.help.option.verbose=active le mode verbeux
cmdline.create.help.option.admin=ajoute l'utilisateur au groupe "admins"
cmdline.create.help.option.reset=envoie par mail un lien de réinitialisation de mot de passe a l'utilisateur.
cmdline.create.help.option.noerror=Ne pas afficher d'erreur si l'utilisateur existe déjà
cmdline.create.help.parameter.login=le login du nouvel utilisateur
cmdline.create.help.parameter.email=l'email du nouvel utilisateur
cmdline.create.help.parameter.password=le mot de passe de l'utilisateur, si il n'est pas défini et que le flag '--reset' n'est pas activé, le mot de passe sera généré aléatoirement
cmdline.delete.help.description=Supprimer un compte utilisateur
cmdline.delete.help.text=Supprimer un compte utilisateur
cmdline.delete.help.parameter.login=L'identifiant du compte à supprimer
cmdline.import.help.description=Importe des utilisateurs depuis un fichier CSV
cmdline.import.help.text=Chaque champ du fichier CSV peut correspondre à une propriété d’un compte. Vous devez déclarer l’ordre des champs avec le paramètre fields.\nPar exemple, lorsque chaque ligne du CSV contient un identifiant, une date de naissance et une adresse e-mail,\net que les champs possibles sont uniquement login et email (donc ignorer la date de naissance), vous devez \ndéclarer le paramètre fields avec la valeur 'login,,email' (pas de nom pour le deuxième champs qui correspond\nà\
la date de naissance ignorée).\nExemple pour la commande : php console.php jcommunity~user:import accounts.csv "login,,email"
cmdline.import.help.parameter.csvfile=Chemin du fichier CSV à importer
cmdline.import.help.parameter.fields=Liste des champs à importer, séparés par des virgules.\nIndiquez une valeur vide ou _ignore_ pour ignorer un champ.\nLe champ _role_ peut contenir le rôle de l’utilisateur pour l’ACL.\nListe des champs possibles : %s
cmdline.import.help.option.reset=Envoi un email à l'utilisateur pour qu'il finalise son enregistrement et indique son mot de passe
cmdline.import.help.option.separator=Caractère utilisé pour séparer les champs dans le CSV
cmdline.import.help.option.enclosure=Caractère utilisé pour encadrer les valeurs dans le CSV
cmdline.import.help.option.wait=Nombre de dixième de secondes d'attente entre chaque création de compte. Pour éviter de dépasser le taux d'envoi de mail acceptable par le serveur mail.
cmdline.import.help.option.maxaccount=Nombre de comptes à importer au maximum, quand on ne veut pas tout importer d'un seul coup. 0 = tout importer
cmdline.import.help.option.ignorefirstline=Ignorer la première ligne du fichier CSV si elle ne contient pas les données d'un compte.
cmdline.import.error.unknownfield=Champs inconnu : %s
cmdline.import.error.bad.field.count=Les valeurs CSV ne correspondent pas au nombre de propriétés (ligne %s).
cmdline.import.notice.login.exists=ligne %s: %s - Le compte %s existe déjà.
cmdline.import.notice.login.imported=ligne %s: %s - importé.
import.error.login.missing=L'email est manquant dans les données CSV.
import.error.email.missing=Le login est manquant dans les données CSV.
cmdline.import.error.login.missing=Le login est manquant dans la liste des champs à importer.
cmdline.import.error.email.missing=L'email est manquant dans la liste des champs à importer.
cmdline.import.error.opening.file=Impossible de lire le fichier CSV %s.
